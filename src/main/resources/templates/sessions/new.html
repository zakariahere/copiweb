<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head><title>New Session</title></head>
<body>
<section>
    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">
            <div class="d-flex align-items-center mb-4">
                <a th:href="@{/sessions}" class="btn btn-outline-secondary btn-sm me-3">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <h2 class="mb-0"><i class="bi bi-plus-circle me-2"></i>New Session</h2>
            </div>

            <!-- Agent Picker -->
            <div class="mb-4">
                <div class="d-flex align-items-center justify-content-between mb-2">
                    <h6 class="mb-0 fw-semibold text-secondary">
                        <i class="bi bi-people me-1"></i>Pick an Agent
                        <span class="fw-normal">(optional — pre-fills system prompt)</span>
                    </h6>
                    <a th:href="@{/agents}" class="text-secondary small">Manage agents</a>
                </div>
                <div class="d-flex flex-wrap gap-2" id="agent-picker">
                    <button type="button"
                            class="btn btn-sm agent-pick-btn"
                            th:each="agent : ${profiles}"
                            th:attr="data-profile-id=${agent.id},data-model=${agent.model},data-system-prompt=${agent.systemPrompt}"
                            th:classappend="${agent.id == selectedProfileId} ? ('btn-' + ${agent.color}) : ('btn-outline-' + ${agent.color})"
                            th:id="'agent-btn-' + ${agent.id}">
                        <i th:classappend="${agent.icon} + ' me-1'"></i>
                        <span th:text="${agent.name}">Agent</span>
                    </button>
                </div>
            </div>

            <div th:if="${error}" class="alert alert-danger">
                <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span>
            </div>

            <div class="card bg-secondary bg-opacity-10 border-secondary">
                <div class="card-body p-4">
                    <form th:action="@{/sessions}" method="post" th:object="${createRequest}">

                        <div class="mb-3">
                            <label for="name" class="form-label fw-semibold">Session Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control bg-dark text-light border-secondary"
                                   id="name" th:field="*{name}" placeholder="e.g. Batch Job Forensics"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''"/>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="model" class="form-label fw-semibold">Model <span class="text-danger">*</span></label>
                            <select class="form-select bg-dark text-light border-secondary" id="model" th:field="*{model}">
                                <option th:each="m : ${models}"
                                        th:value="${m.id}"
                                        th:text="${m.name} + ' (' + ${m.id} + ')'"
                                        th:selected="${m.id == 'gpt-4.1'}">Model</option>
                                <option th:if="${models.empty}" value="gpt-4.1">gpt-4.1 (default)</option>
                                <option th:if="${models.empty}" value="claude-sonnet-4">claude-sonnet-4</option>
                                <option th:if="${models.empty}" value="o3-mini">o3-mini</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="workingDirectory" class="form-label fw-semibold">
                                Working Directory
                                <span class="text-secondary fw-normal">(optional)</span>
                            </label>
                            <div class="input-group">
                                <span class="input-group-text bg-dark border-secondary text-secondary">
                                    <i class="bi bi-folder2-open"></i>
                                </span>
                                <input type="text" class="form-control bg-dark text-light border-secondary font-monospace"
                                       id="workingDirectory" th:field="*{workingDirectory}"
                                       placeholder="/path/to/your/project"/>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="systemPrompt" class="form-label fw-semibold">System Prompt
                                <span class="text-secondary fw-normal">(optional — pre-filled by agent picker above)</span>
                            </label>
                            <textarea class="form-control bg-dark text-light border-secondary font-monospace"
                                      id="systemPrompt" th:field="*{systemPrompt}"
                                      rows="5" placeholder="Additional instructions appended to the default system prompt..."></textarea>
                        </div>

                        <div class="mb-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="streaming"
                                       th:field="*{streaming}" role="switch"/>
                                <label class="form-check-label fw-semibold" for="streaming">
                                    Enable Streaming
                                    <small class="text-secondary fw-normal ms-1">— receive response chunks in real time</small>
                                </label>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-play-circle me-1"></i>Create Session
                            </button>
                            <a th:href="@{/sessions}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
    (function () {
        const selectedId = /*[[${selectedProfileId}]]*/ null;
        const modelSelect = document.getElementById('model');
        const systemPromptArea = document.getElementById('systemPrompt');

        document.querySelectorAll('.agent-pick-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                // Deselect all — reset to outline variant
                document.querySelectorAll('.agent-pick-btn').forEach(b => {
                    const classes = [...b.classList];
                    classes.forEach(c => {
                        if (c.startsWith('btn-') && !c.startsWith('btn-outline-') && !c.startsWith('btn-sm')) {
                            b.classList.remove(c);
                            b.classList.add('btn-outline-' + c.replace('btn-', ''));
                        }
                    });
                });

                // Select clicked — swap outline to solid
                const classes = [...btn.classList];
                classes.forEach(c => {
                    if (c.startsWith('btn-outline-')) {
                        btn.classList.remove(c);
                        btn.classList.add('btn-' + c.replace('btn-outline-', ''));
                    }
                });

                // Pre-fill model and system prompt
                const m = btn.dataset.model;
                const sp = btn.dataset.systemPrompt;
                if (m && modelSelect) {
                    for (const opt of modelSelect.options) {
                        if (opt.value === m) { opt.selected = true; break; }
                    }
                }
                if (systemPromptArea != null) {
                    systemPromptArea.value = sp || '';
                }
            });
        });
    })();
    </script>
</section>
</body>
</html>
