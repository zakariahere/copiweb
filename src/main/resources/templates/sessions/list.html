<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head><title>Sessions</title></head>
<body>
<section>
    <div class="d-flex align-items-center mb-4">
        <h2 class="mb-0 me-3"><i class="bi bi-collection me-2"></i>Sessions</h2>
        <a th:href="@{/sessions/new}" class="btn btn-primary btn-sm">
            <i class="bi bi-plus-circle me-1"></i>New Session
        </a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${sessions.empty}" class="text-center text-secondary py-5">
        <i class="bi bi-collection fs-1 d-block mb-3"></i>
        <p>No sessions yet.</p>
        <a th:href="@{/sessions/new}" class="btn btn-primary">Create your first session</a>
    </div>

    <div th:unless="${sessions.empty}" class="card bg-secondary bg-opacity-10 border-secondary">
        <div class="table-responsive">
            <table class="table table-dark table-hover align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>Name</th>
                        <th>Model</th>
                        <th>Status</th>
                        <th class="text-center">Turns</th>
                        <th>Created</th>
                        <th>Last Active</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="s : ${sessions}">
                        <td>
                            <a th:href="@{/sessions/{id}(id=${s.id})}" class="text-decoration-none fw-semibold"
                               th:text="${s.name}">Session Name</a>
                        </td>
                        <td><span class="badge bg-dark border border-secondary" th:text="${s.model}">model</span></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${s.status.name() == 'ACTIVE'} ? 'bg-success' :
                                                  (${s.status.name() == 'IDLE'} ? 'bg-primary' :
                                                  (${s.status.name() == 'ERROR'} ? 'bg-danger' :
                                                  (${s.status.name() == 'CREATING'} ? 'bg-warning text-dark' : 'bg-secondary')))"
                                  th:text="${s.status}">STATUS</span>
                        </td>
                        <td class="text-center" th:text="${s.turnCount}">0</td>
                        <td class="small text-secondary"
                            th:text="${s.createdAt != null} ? ${#temporals.format(s.createdAt, 'yyyy-MM-dd HH:mm')} : '—'">—</td>
                        <td class="small text-secondary"
                            th:text="${s.lastActiveAt != null} ? ${#temporals.format(s.lastActiveAt, 'yyyy-MM-dd HH:mm')} : '—'">—</td>
                        <td class="text-end">
                            <a th:href="@{/sessions/{id}(id=${s.id})}" class="btn btn-outline-primary btn-sm me-1">
                                <i class="bi bi-chat-dots"></i>
                            </a>
                            <a th:href="@{/sessions/{id}/history(id=${s.id})}" class="btn btn-outline-secondary btn-sm me-1">
                                <i class="bi bi-clock-history"></i>
                            </a>
                            <form th:action="@{/sessions/{id}/delete(id=${s.id})}" method="post" class="d-inline"
                                  onsubmit="return confirm('Delete this session?')">
                                <button type="submit" class="btn btn-outline-danger btn-sm">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
