<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head><title th:text="${agentSession.name}">Session</title></head>
<body>
<section>
    <!-- Hidden meta for JS -->
    <div id="session-meta"
         th:attr="data-sdk-session-id=${agentSession.sessionId},data-db-session-id=${agentSession.id},data-status=${agentSession.status}"
         style="display:none;"></div>

    <!-- Header -->
    <div class="d-flex align-items-center mb-3 flex-wrap gap-2">
        <a th:href="@{/sessions}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h2 class="mb-0 me-2" th:text="${agentSession.name}">Session Name</h2>
        <span class="badge fs-6"
              th:classappend="${agentSession.status.name() == 'ACTIVE' ? 'bg-success' : (agentSession.status.name() == 'IDLE' ? 'bg-primary' : (agentSession.status.name() == 'ERROR' ? 'bg-danger' : 'bg-secondary'))}"
              th:text="${agentSession.status}" id="status-badge">STATUS</span>
        <span class="text-secondary small">
            <i class="bi bi-cpu me-1"></i><span th:text="${agentSession.model}">model</span>
        </span>
        <div class="ms-auto d-flex gap-2">
            <a th:href="@{/sessions/{id}/history(id=${agentSession.id})}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-clock-history me-1"></i>History
            </a>
            <form th:if="${agentSession.status.name() == 'CLOSED' or agentSession.status.name() == 'ERROR'}"
                  th:action="@{/sessions/{id}/resume(id=${agentSession.id})}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-success btn-sm">
                    <i class="bi bi-play-circle me-1"></i>Resume
                </button>
            </form>
            <form th:action="@{/sessions/{id}/delete(id=${agentSession.id})}" method="post" class="d-inline"
                  onsubmit="return confirm('Delete this session?')">
                <button type="submit" class="btn btn-outline-danger btn-sm">
                    <i class="bi bi-trash me-1"></i>Delete
                </button>
            </form>
        </div>
    </div>

    <!-- Flash messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Main split pane -->
    <div class="row g-3" style="height: calc(100vh - 240px); min-height: 580px;">

        <!-- LEFT: Chat + Stream -->
        <div class="col-lg-7 d-flex flex-column h-100">

            <!-- Streaming response area -->
            <div class="card bg-black border-secondary flex-grow-1 mb-3 overflow-hidden">
                <div class="card-header bg-black border-secondary d-flex justify-content-between align-items-center">
                    <span class="small fw-semibold">
                        <i class="bi bi-chat-dots me-1"></i>Response
                    </span>
                    <span id="status-indicator" class="d-flex align-items-center gap-2 small text-secondary">
                        <span id="status-dot" class="status-dot status-idle"></span>
                        <span id="status-text">idle</span>
                    </span>
                </div>
                <div class="card-body overflow-auto p-3" style="height: calc(100% - 48px);">
                    <div id="stream-output" class="font-monospace small text-success lh-base" style="white-space:pre-wrap;"></div>
                    <span id="stream-cursor" class="cursor-blink" style="display:none;">&#9611;</span>
                </div>
            </div>

            <!-- Tool execution timeline -->
            <div class="card bg-secondary bg-opacity-10 border-secondary mb-3" id="tool-section"
                 style="display:none; max-height:200px; overflow-y:auto;">
                <div class="card-header small fw-semibold border-secondary">
                    <i class="bi bi-tools me-1"></i>Tool Executions
                </div>
                <div class="card-body p-2" id="tool-timeline"></div>
            </div>

            <!-- Message input -->
            <div class="card bg-secondary bg-opacity-10 border-secondary">
                <div class="card-body p-3">
                    <div class="input-group">
                        <textarea id="message-input" class="form-control bg-dark text-light border-secondary"
                                  rows="3" placeholder="Send a message to the agent..."
                                  style="resize:none;"></textarea>
                        <button id="send-btn" class="btn btn-primary" type="button">
                            <i class="bi bi-send-fill"></i>
                        </button>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mt-2">
                        <small class="text-secondary">Ctrl+Enter to send</small>
                        <button id="abort-btn" class="btn btn-outline-danger btn-sm" style="display:none;">
                            <i class="bi bi-stop-circle me-1"></i>Abort
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- RIGHT: Event console -->
        <div class="col-lg-5 d-flex flex-column h-100">
            <div class="card bg-black border-secondary flex-grow-1 overflow-hidden">
                <div class="card-header bg-black border-secondary d-flex justify-content-between align-items-center">
                    <span class="small fw-semibold">
                        <i class="bi bi-terminal me-1"></i>Event Console
                    </span>
                    <button class="btn btn-outline-secondary btn-sm py-0" id="clear-console-btn" title="Clear">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>
                <div class="card-body overflow-auto p-2" id="event-console"
                     style="height: calc(100% - 48px); font-size: 0.78rem;">
                    <div th:each="e : ${events}" class="event-entry mb-1"
                         th:classappend="${e.eventType.name() == 'SESSION_ERROR' ? 'text-danger' : (e.eventType.name() == 'USER_MSG' ? 'text-info' : (e.eventType.name() == 'TOOL_START' or e.eventType.name() == 'TOOL_COMPLETE' ? 'text-warning' : 'text-secondary'))}">
                        <span class="text-secondary me-1"
                              th:text="${#temporals.format(e.occurredAt, 'HH:mm:ss')}">time</span>
                        <span class="badge bg-dark border me-1"
                              th:classappend="${e.eventType.name() == 'SESSION_ERROR' ? 'border-danger' : (e.eventType.name() == 'USER_MSG' ? 'border-info' : (e.eventType.name().startsWith('TOOL_') ? 'border-warning' : 'border-secondary'))}"
                              th:text="${e.eventType}">TYPE</span>
                        <span th:text="${#strings.abbreviate(e.content != null ? e.content : (e.toolName != null ? e.toolName : '—'), 80)}">content</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/sse-client.js}"></script>
    <script th:src="@{/js/chat.js}"></script>
</section>
</body>
</html>
