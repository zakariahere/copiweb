<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head><title>Dashboard</title></head>
<body>
<section>
    <div class="d-flex align-items-center mb-4">
        <h2 class="mb-0 me-3"><i class="bi bi-speedometer2 me-2"></i>Dashboard</h2>
        <a th:href="@{/sessions/new}" class="btn btn-primary btn-sm">
            <i class="bi bi-plus-circle me-1"></i>New Session
        </a>
    </div>

    <!-- Stat Cards -->
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <div class="card bg-success bg-opacity-10 border-success h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <p class="text-secondary small mb-1">Active Sessions</p>
                            <h3 class="mb-0 text-success" th:text="${activeSessions}">0</h3>
                        </div>
                        <i class="bi bi-activity text-success fs-2 opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card bg-primary bg-opacity-10 border-primary h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <p class="text-secondary small mb-1">Total Sessions</p>
                            <h3 class="mb-0 text-primary" th:text="${totalSessions}">0</h3>
                        </div>
                        <i class="bi bi-collection text-primary fs-2 opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card bg-info bg-opacity-10 border-info h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <p class="text-secondary small mb-1">Events Today</p>
                            <h3 class="mb-0 text-info" th:text="${eventsToday}">0</h3>
                        </div>
                        <i class="bi bi-lightning text-info fs-2 opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card bg-danger bg-opacity-10 border-danger h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <p class="text-secondary small mb-1">Errors Today</p>
                            <h3 class="mb-0 text-danger" th:text="${errorsToday}">0</h3>
                        </div>
                        <i class="bi bi-exclamation-triangle text-danger fs-2 opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-3">
        <!-- Recent Sessions -->
        <div class="col-md-6">
            <div class="card bg-secondary bg-opacity-10 border-secondary">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-clock-history me-2"></i>Recent Sessions</span>
                    <a th:href="@{/sessions}" class="btn btn-outline-secondary btn-sm">View All</a>
                </div>
                <div class="card-body p-0">
                    <div th:if="${recentSessions.empty}" class="text-center text-secondary py-4">
                        No sessions yet. <a th:href="@{/sessions/new}">Create one</a>.
                    </div>
                    <ul class="list-group list-group-flush" th:unless="${recentSessions.empty}">
                        <li class="list-group-item bg-transparent border-secondary d-flex justify-content-between align-items-center"
                            th:each="s : ${recentSessions}">
                            <div>
                                <a th:href="@{/sessions/{id}(id=${s.id})}" class="text-decoration-none fw-semibold"
                                   th:text="${s.name}">Session</a>
                                <small class="text-secondary ms-2" th:text="${s.model}">model</small>
                            </div>
                            <span class="badge"
                                  th:classappend="${s.status.name() == 'ACTIVE' or s.status.name() == 'IDLE'} ? 'bg-success' : (${s.status.name() == 'ERROR'} ? 'bg-danger' : 'bg-secondary')"
                                  th:text="${s.status}">STATUS</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- Recent Activity -->
        <div class="col-md-6">
            <div class="card bg-secondary bg-opacity-10 border-secondary">
                <div class="card-header">
                    <i class="bi bi-activity me-2"></i>Recent Activity (24h)
                </div>
                <div class="card-body p-0">
                    <div th:if="${recentActivity.empty}" class="text-center text-secondary py-4">
                        No recent activity.
                    </div>
                    <ul class="list-group list-group-flush" th:unless="${recentActivity.empty}">
                        <li class="list-group-item bg-transparent border-secondary"
                            th:each="e : ${recentActivity}">
                            <div class="d-flex justify-content-between align-items-start">
                                <div class="flex-grow-1 me-2">
                                    <span class="badge bg-dark text-secondary border border-secondary me-1"
                                          th:text="${e.eventType}">TYPE</span>
                                    <span class="small text-secondary"
                                          th:text="${#strings.abbreviate(e.content ?: e.toolName ?: '—', 60)}">content</span>
                                </div>
                                <small class="text-secondary text-nowrap"
                                       th:text="${#temporals.format(e.occurredAt, 'HH:mm:ss')}">time</small>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
