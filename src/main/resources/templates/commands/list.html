<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head><title>Workflow Commands</title></head>
<body>
<section>
    <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
        <div>
            <h2 class="mb-1"><i class="bi bi-lightning me-2"></i>Workflow Commands</h2>
            <p class="text-secondary mb-0 small">
                Pre-built prompt templates. Type <kbd>/</kbd> in any session chat to launch one.
            </p>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-md-6 col-xl-4" th:each="cmd : ${commands}">
            <div class="card h-100 border-secondary" style="background: rgba(255,255,255,0.04);">
                <div class="card-body d-flex flex-column gap-2 p-4">
                    <div class="d-flex align-items-start justify-content-between gap-2">
                        <div class="d-flex align-items-center gap-2">
                            <span class="fs-5 text-warning"><i th:classappend="${cmd.icon}"></i></span>
                            <div>
                                <h6 class="mb-0 fw-semibold" th:text="${cmd.label}">Label</h6>
                                <code class="text-secondary small" th:text="'/' + ${cmd.name}">/command</code>
                            </div>
                        </div>
                        <span class="badge bg-dark border border-secondary small" th:if="${cmd.builtIn}">built-in</span>
                    </div>

                    <p class="text-secondary small mb-0 flex-grow-1" th:text="${cmd.description}">description</p>

                    <!-- Recommended agent badge -->
                    <div th:if="${cmd.agentProfile != null}" class="d-flex align-items-center gap-1">
                        <small class="text-secondary">Recommended agent:</small>
                        <span class="badge border small"
                              th:classappend="'text-' + ${cmd.agentProfile.color} + ' border-' + ${cmd.agentProfile.color}"
                              style="background: transparent;">
                            <i th:classappend="${cmd.agentProfile.icon} + ' me-1'"></i>
                            <span th:text="${cmd.agentProfile.name}">Agent</span>
                        </span>
                    </div>

                    <!-- Params preview -->
                    <div th:if="${cmd.paramSchema != null and !cmd.paramSchema.isBlank()}"
                         class="d-flex flex-wrap gap-1">
                        <small class="text-secondary w-100">Params:</small>
                        <!-- JS will render params from JSON; show placeholder -->
                        <code class="text-secondary small param-preview" th:attr="data-schema=${cmd.paramSchema}">
                            loading...
                        </code>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    // Render param names from JSON schema
    document.querySelectorAll('.param-preview').forEach(el => {
        try {
            const schema = JSON.parse(el.dataset.schema);
            el.textContent = schema.map(p => '{{' + p.name + '}}').join(', ');
        } catch { el.textContent = ''; }
    });
    </script>
</section>
</body>
</html>
